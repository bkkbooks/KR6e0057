body:
  text: 元魏西域三藏吉迦夜譯如是我聞一時佛在王舍城耆闍崛山與大比丘衆千二百五十人俱菩薩萬人其名曰智幢菩薩法幢菩薩月幢菩薩日幢菩薩無量幢菩薩跋陀波羅等十六正士文殊師利等六十同意彌勒菩薩等賢劫一切菩提薩埵爾時無盡智菩提薩埵從座起整衣服偏袒右肩右膝著地以種種寶華散於佛上白佛言世尊欲有所問唯願世尊開示解説爾時世尊告無盡智菩薩善哉善哉善男子若有疑難恣汝所問如來當為隨問解説令汝歡喜爾時無盡智菩提薩埵白佛言世尊菩提心世尊謂菩提心云何當知菩提薩埵成就菩提心何等為菩提心亦無菩提心薩埵亦不可得亦不離菩提名曰菩提心菩提者亦不可説不可見無有對薩埵亦不可得云何於此諸法當得開解世尊告曰善男子菩提者是皆言説俗數施設善男子菩提者非言説非俗數非施設善男子如菩提非言説薩埵及心至一切法亦復如是當作是知若如是心是名菩提心菩提亦不過去當來今現在所謂薩埵及心亦不過去當來今現在若如是知者菩提薩埵不可得彼處都無所得於一切法得無所得是名得菩提心如阿羅漢阿羅漢果亦不可得彼都無所得但是俗數言説有耳於一切法無所得是名得菩提心亦非初業菩提薩埵度義義名為菩提薩埵亦非彼心非施設心非衆生非施設衆生非聲聞非施設聲聞非辟支佛非施設辟支佛非菩提薩埵非施設菩提薩埵非有為非施設有為法非無為非施設無為法可得已得當得但如説法隨順故説一切善根等起當知初發心彼因檀波羅蜜猶如大地所持當知第二心起彼因尸波羅蜜猶如師子獸王勇猛當知第三心起彼因羼提波羅蜜猶如那羅延勇猛大力便當知第四心起摧伏一切諸結怨敵彼因毗梨耶波羅蜜種種善根功德華開當知第五心起譬如天帝釋大會拘毗陀羅樹彼因禪那波羅蜜猶如日輪無量光曜當知第六心起悉能除滅一切暗冥彼因般若波羅蜜本願功德普現莊嚴當知第七心起如商人主將諸商人能度曠野彼因方便波羅蜜淨除一切過惡所欲如意當知第八心起滿足明淨猶如秋月周滿所願當知第九心起一切所作皆悉休息譬如貧人得無盡寶藏猶如虛空離垢明淨當知第十心起究竟一切功德彼岸智慧辨才無盡一切法主猶轉輪王如是善男子其成就此十種心者是名為菩提薩埵摩訶薩埵第一薩埵最上薩埵離罪薩埵最尊薩埵然善男子菩提薩埵及心於第一義都不可得又善男子菩提薩埵初心起有法寶等起三摩提攝取心而生菩提薩埵第二心起有不動三摩提攝取心而生彼第三心起名善住三摩提攝取心而生彼第四心起名不退轉三摩提攝取心而生彼第五心起名集華三摩提攝取心而生彼第六心起名日光三摩提攝取心而生彼第七心起名義滿足三摩提攝取心而生彼第八心起名慧炬三摩提攝取心而生彼第九心起名佛見在前三摩提攝取心而生彼第十心起名首楞嚴三摩提攝取心而生又善男子初地菩提薩埵先覩嘉瑞三千大千佛土億百千珍奇寶藏悉現境界第二地先覩嘉瑞三千大千佛土平如水掌悉現境界第三地先覩嘉瑞勇健堅強手執兵仗悉現境界第四地先覩嘉瑞曼陀羅風從四方來吹種種華普散大地悉現境界第五地先覩嘉瑞一切女人嚴具莊飾瞻匐華鬘解脫華鬘憂鉢羅華鬘婆利師華鬘莊嚴其首悉現境界第六地先覩嘉瑞衆寶浴池八功德水充滿其中有四階道底布金沙澄靖清徹自見己身遊戲其中悉現境界第七地先覩嘉瑞見左右面有大地獄楚毒峻嶮自見己身超出此難悉現境界第八地先覩嘉瑞自見兩肩有師子獸王首冠繒帛其身雄壯一切毒害諸惡獸等無不摧伏悉現境界第九地先覩嘉瑞轉輪聖王大臣剎利百千眷屬以法化導一切衆生手執繒蓋衆寶百千莊嚴其首悉現境界第十地先覩嘉瑞自見作佛身黃金色圓光一尋億百千梵圍繞説法善男子是為菩提薩埵十地前相當作是知悉從十地三摩提之所出生又善男子菩提薩埵初發意地得最勝處陀羅尼第二地得難伏陀羅尼第三地得善住陀羅尼第四地得難當陀羅尼第五地得功德華普集莊嚴陀羅尼第六地得智光明陀羅尼第七地得勝趣陀羅尼第八地得八萬四千陀羅尼澄靖司陀羅尼為首第九地得六十那由他陀羅尼無盡陀羅尼為首第十地得恆河沙陀羅尼出生無量陀羅尼為首是為菩提薩埵十地陀羅尼當作是知又善男子菩提薩埵初發意地具足檀波羅蜜第二地具足尸波羅蜜第三地具足羼提波羅蜜第四地具足毗梨耶波羅蜜第五地具足禪那波羅蜜第六地具足般若波羅蜜第七地具足方便波羅蜜第八地具足願波羅蜜第九地具足力波羅蜜第十地具足智波羅蜜如是諸波羅蜜於諸地中皆悉成就又善男子有十種檀波羅蜜何等為十信根為首檀波羅蜜三摩提為首檀波羅蜜大慈為首檀波羅蜜大悲為首檀波羅蜜深心希望為首檀波羅蜜一切智為首檀波羅蜜安立衆生為首檀波羅蜜四攝為首檀波羅蜜護持正法為首檀波羅蜜樂求佛法為首檀波羅蜜復有十種尸羅波羅蜜何等為十種離八難為首尸羅波羅蜜建立佛法為首尸羅波羅蜜超越聲聞辟支佛地為首尸羅波羅蜜淨身業為首尸羅波羅蜜淨口業為首尸羅波羅蜜淨意業為首尸波羅蜜莊嚴心為首尸波羅蜜人世界清淨為首尸波羅蜜一切願求滿足為首尸波羅蜜不害為首尸波羅蜜復有十種羼提波羅蜜何等為十忍力為首羼提波羅蜜成熟衆生為首羼提波羅蜜意解為首羼提波羅蜜深法忍為首羼提波羅蜜斷煩惱為首羼提波羅蜜離瞋恚為首羼提波羅蜜不計身為首羼提波羅蜜不計命為首羼提波羅蜜斷諸無智為首羼提波羅蜜觀諸法平等為首羼提波羅蜜復有十種毗梨耶波羅蜜何等為十精進根為首毗梨耶波羅蜜精進力為首毗梨耶波羅蜜等方便為首毗梨耶波羅蜜念處為首毗梨耶波羅蜜代一切衆生身所作為首毗梨耶波羅蜜隨順一切衆生口意轉為首毗梨耶波羅蜜不退還為首毗梨耶波羅蜜極精勤為首毗梨耶波羅蜜伏一切煩惱怨家為首毗梨耶波羅蜜一切智智為首毗梨耶波羅蜜復有十種禪波羅蜜何等為十定根為首禪波羅蜜定力為首禪波羅蜜等定為首禪波羅蜜諸禪解脫為首禪波羅蜜善法為首禪波羅蜜是處為首禪波羅蜜不亂為首禪波羅蜜非處為首禪波羅蜜害一切結使為首禪波羅蜜定身滿足為首禪波羅蜜復有十種般若波羅蜜何等為十慧根為首般若波羅蜜慧力為首般若波羅蜜正見為首般若波羅蜜正念為首般若波羅蜜陰巧便為首般若波羅蜜觀界入為首般若波羅蜜聖諦為首般若波羅蜜無障礙為首般若波羅蜜除一切妄見為首般若波羅蜜無生法忍為首般若波羅蜜復有十種方便智波羅蜜何等為十衆生希望方便行為首方便波羅蜜安立衆生為首方便波羅蜜大悲為首方便波羅蜜化衆生不勞惓為首方便波羅蜜超越聲聞辟支佛地為首方便波羅蜜入諸波羅蜜為首方便波羅蜜如實觀諸法為首方便波羅蜜不思議力為首方便波羅蜜不退轉為首方便波羅蜜降伏衆魔為首方便波羅蜜何等為波羅蜜義行增進滿足義是謂波羅蜜義勝妙智滿足是波羅蜜義不著有為無為法義是波羅蜜義覺生死過義是波羅蜜義覺悟不覺悟者義是波羅蜜義開示一切無盡法藏義是波羅蜜義無間礙解脫具足義是波羅蜜義覺知布施平等義是波羅蜜義覺知戒忍精進一心智慧平等義是波羅蜜義決定巧便義是波羅蜜義知一切衆生法性義是波羅蜜義無生法忍滿足義是波羅蜜義不退地滿足義是波羅蜜義嚴淨佛土義是波羅蜜義成熟衆生義是波羅蜜義覺場具足義是波羅蜜義降伏衆魔義是波羅蜜義一切佛法滿足義是波羅蜜義十力四無所畏十八不共法滿足義是波羅蜜義攝取一切化生義是波羅蜜義三轉十二行法輪義是波羅蜜義爾時會中有天名師子幢無礙光耀白佛言世尊甚奇甚特是名一切具足是名究竟一切佛法功德世尊答曰如是如是諸天其有善男子善女人聞是法正憶念者當知是阿惟越致菩提薩埵何以故天子是善男子善女人善根成熟故令耳根得聞是經一切善根成熟故得聞此經已終不離真實觀不離諸佛世尊不離諸佛法不離轉法輪不離海印陀羅尼不離無盡陀羅尼不離遍入衆生行陀羅尼不離無盡光日幢陀羅尼不離月無垢相陀羅尼不離無垢等起相陀羅尼若菩薩得是陀羅尼者悉能一時變身為佛周滿十方教化衆生然於諸法亦不死亦不去而度脫衆生衆生亦不可得説法教化諸文字等亦不可得示現死生亦不生知諸法平等無去無來亦不作非不作故説是法時三千菩提薩埵得無生法忍復次天子若有讀誦持是法者終不離息一切纏陀羅尼不離金剛堅強破散一切煩惱山陀羅尼終不離説無言普入諸波羅蜜陀羅尼終不離能説異名句諸語陀羅尼不離虛空離垢出生無盡印陀羅尼不離成就無量佛身一切生盡陀羅尼説是法時無量衆生皆得法忍無量衆生發阿耨多羅三藐三菩提心佛説是時無盡智菩薩師子幢無礙光耀天子及諸大聲聞天人阿修羅為佛作禮皆大歡喜
